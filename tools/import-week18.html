    <code>weeks["2026-W18"].rows</code>

    <code>customers</code>,
    <code>products</code>,
    <code>productPackagingTypes</code>

  <p class="warn">
    Перед імпортом буде зроблено backup поточного Firebase state у localStorage цього браузера.

    ]

    function option(packageName, weightKg, isDefault = false) {
      return {
        id: createPackageId(packageName, weightKg),
        packageName,
        weightKg,
        label: packageName,
        isDefault
      }
    }

    function item(packageName, weightKg, qty) {
      return {
        packageId: createPackageId(packageName, weightKg),
        packageName,
        weightKg,
        label: packageName,
        qty
      }
    }

    function row(id, customerName, deliveryDay, merknad, packed, delivered, cells) {
      const normalizedCells = {}

      Object.entries(cells || {}).forEach(([productName, items]) => {
        if (!Array.isArray(items) || items.length === 0) return

        normalizedCells[productName] = {
          items
        }
      })

      return {
        id,
        customerName,
        deliveryDay,
        merknad,
        createdAt: IMPORT_TIMESTAMP,
        updatedAt: IMPORT_TIMESTAMP,
        cells: normalizedCells,
        checks: {
          A: Boolean(packed),
          B: Boolean(delivered)
        }
      }
    }

    function createPackageId(packageName, weightKg) {
      const namePart = normalizePart(packageName)
      const weightPart = normalizePart(String(weightKg || 0))

      if (namePart === 'kg') return 'default_kg'
      if (namePart === 'l') return 'default_l'

      return `${namePart}__${weightPart}`
    }

    function normalizePart(value) {
      return String(value || '')
        .trim()
        .toLowerCase()
        .replace(',', '.')
        .replace(/\s+/g, '_')
        .replace(/[^a-z0-9._-]/g, '')
    }

    function normalizeName(value) {
      return String(value || '').trim().toLowerCase()
    }

    function mergeCustomers(existing = [], incoming = []) {
      const result = Array.isArray(existing) ? [...existing] : []
      const used = new Set(
        result.map((customer) => normalizeName(customer?.name || customer))
      )

      incoming.forEach((customer) => {
        if (!customer?.name) return
        if (used.has(normalizeName(customer.name))) return

        result.push(customer)
        used.add(normalizeName(customer.name))
      })

      return result
    }

    function mergeProducts(existing = [], incoming = []) {
      const result = Array.isArray(existing) ? [...existing] : []
      const used = new Set(
        result.map((product) => normalizeName(product?.name || product))
      )

      incoming.forEach((product) => {
        if (!product?.name) return
        if (used.has(normalizeName(product.name))) return

        result.push(product)
        used.add(normalizeName(product.name))
      })

      return result
    }

    function mergePackaging(existing = {}, incoming = {}) {
      const result = { ...(existing || {}) }

      Object.entries(incoming).forEach(([productName, options]) => {
        const current = Array.isArray(result[productName]) ? [...result[productName]] : []
        const used = new Set(current.map((option) => option?.id).filter(Boolean))

        options.forEach((option) => {
          if (!option?.id) return
          if (used.has(option.id)) return

          current.push(option)
          used.add(option.id)
        })

        result[productName] = current
      })

      return result
    }

    function buildNextState(currentState) {
      const now = new Date().toISOString()
      const current = currentState && typeof currentState === 'object' ? currentState : {}

      return {
        ...current,
        customers: mergeCustomers(current.customers, CUSTOMERS),
        products: mergeProducts(current.products, PRODUCTS),
        productPackagingTypes: mergePackaging(
          current.productPackagingTypes,
          PRODUCT_PACKAGING_TYPES
        ),
        weeks: {
          ...(current.weeks || {}),
          [WEEK_ID]: {
            ...(current.weeks?.[WEEK_ID] || {}),
            rows: ROWS
          }
        },
        logs: [
          {
            id: `import_week18_${Date.now()}`,
            createdAt: now,
            weekId: WEEK_ID,
            weekLabel: WEEK_LABEL,
            action: 'import_week',
            actionLabel: 'Importerte uke 18 fra Excel',
            customerName: '',
            deliveryDay: '',
            productName: '',
            oldValue: '',
            newValue: `${ROWS.length} rader`,
            note: 'Gjenopprettet fra combined_orders-2.xlsx'
          },
          ...((Array.isArray(current.logs) ? current.logs : []))
        ],
        updatedAt: now
      }
    }

    function log(message, className = '') {
      const el = document.getElementById('log')
      const safe = String(message)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')

      const line = className
        ? `<span class="${className}">${safe}</span>`
        : safe

      el.innerHTML += `\n${line}`
    }

    function buildPreviewText() {
      const rowsWithOrders = ROWS.filter((row) => Object.keys(row.cells || {}).length > 0)

      return [
        `Week: ${WEEK_ID}`,
        `Rows total: ${ROWS.length}`,
        `Rows with orders: ${rowsWithOrders.length}`,
        `Customers to merge: ${CUSTOMERS.length}`,
        `Products to merge: ${PRODUCTS.map((product) => product.name).join(', ')}`,
        '',
        'Customers:',
        CUSTOMERS.map((customer, index) => `${index + 1}. ${customer.name}`).join('\n')
      ].join('\n')
    }

    document.getElementById('previewBtn').onclick = () => {
      document.getElementById('log').textContent = buildPreviewText()
    }

    document.getElementById('importBtn').onclick = async () => {
      document.getElementById('log').textContent = 'Loading Firebase state...'

      try {
        const currentState = await loadFirebaseState()

        const backupKey = `toddum_backup_before_week18_import_${Date.now()}`
        localStorage.setItem(backupKey, JSON.stringify(currentState || null))

        log(`Backup saved to localStorage: ${backupKey}`, 'ok')

        const nextState = buildNextState(currentState)

        log(`Prepared next state.`)
        log(`Week 18 rows: ${nextState.weeks?.[WEEK_ID]?.rows?.length || 0}`)
        log(`Customers after merge: ${nextState.customers?.length || 0}`)
        log(`Products after merge: ${nextState.products?.length || 0}`)

        await saveFirebaseState(nextState)

        log('IMPORT COMPLETE. Firebase updated.', 'ok')
        log('Open the main app and go to Uke 18.', 'ok')
      } catch (error) {
        console.error(error)
        log(`ERROR: ${error?.message || error}`, 'bad')
      }
    }
  </script>
