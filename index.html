<!DOCTYPE html>
<html lang="uk" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Bestillingstabell</title>

  <link rel="stylesheet" href="css/main.css?v=1.0.7" />
  <link rel="stylesheet" href="css/table.css?v=1.0.7" />
  <link rel="stylesheet" href="css/modal.css?v=1.0.7" />
  <link rel="stylesheet" href="css/animations.css?v=1.0.7" />
  <link rel="stylesheet" href="css/mobile.css?v=1.0.7" />
</head>

<body>
  <div class="app">
    <div class="app-top">
      <header class="app-header">
        <div>
          <h1>Bestillingstabell</h1>
          <div id="firebaseStatus" class="sync-status idle">Firebase: idle</div>
        </div>

        <button id="themeToggle" class="theme-toggle">
          🌙
        </button>
      </header>

      <div class="top-bar global-week-nav">
        <button id="prevWeek" class="week-btn" title="Forrige uke">
          Forrige
        </button>

        <div id="weekLabel" class="week-label">
          Uke
        </div>

        <button id="nextWeek" class="week-btn" title="Neste uke">
          Neste
        </button>
      </div>

      <nav class="tabs">
        <button data-tab="orders" class="tab active">Orders</button>
        <button data-tab="rapport" class="tab">Rapport</button>
        <button data-tab="levering" class="tab">Levering</button>
        <button data-tab="analytics" class="tab">Analytics</button>
        <button data-tab="logg" class="tab">Logg</button>
        <button data-tab="loggDetaljert" class="tab">Detaljert logg</button>
        <button data-tab="settings" class="tab">Settings</button>
      </nav>
    </div>

    <main id="tabContent"></main>
  </div>

  <div id="modal" class="modal hidden"></div>

  <div id="contextMenu" class="context-menu hidden">
    <button data-action="edit">Rediger</button>
    <button data-action="clear">Tøm</button>
    <button data-action="copy">Kopier</button>
    <button data-action="paste">Lim inn</button>
  </div>

  <script type="module" src="js/app.js?v=1.0.7"></script>
</body>
</html>
