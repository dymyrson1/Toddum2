<!doctype html>
<html lang="uk" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Bestillingstabell</title>

    <link rel="stylesheet" href="css/layout.css?v=202605010233" />
    <link rel="stylesheet" href="css/main.css?v=202605010233" />
    <link rel="stylesheet" href="css/week.css?v=202605010233" />
    <link rel="stylesheet" href="css/table.css?v=202605010233" />
    <link rel="stylesheet" href="css/modal.css?v=202605010233" />
    <link rel="stylesheet" href="css/settings.css?v=202605010233" />
    <link rel="stylesheet" href="css/analytics.css?v=202605010233" />

    <link rel="stylesheet" href="css/levering.css?v=202605010233" />
    <link rel="stylesheet" href="css/logg.css?v=202605010233" />

    <!-- SHARED TABLE SYSTEM -->
    <link rel="stylesheet" href="css/shared-tables.css?v=1" />

    <link rel="stylesheet" href="css/animations.css?v=202605010233" />
    <link rel="stylesheet" href="css/mobile.css?v=202605010233" />
    <link rel="stylesheet" href="css/theme.css?v=202605010233" />
    <link rel="stylesheet" href="css/icons.css?v=202605040001" />
    <link rel="stylesheet" href="css/rapport.css" />
  </head>

  <body>
    <div class="app">
      <div class="app-top">
        <div class="tabs-row">
          <nav class="tabs">
            <button data-tab="orders" data-icon="table-2" class="tab active">Orders</button>
            <button data-tab="rapport" data-icon="clipboard-list" class="tab">Rapport</button>
            <button data-tab="levering" data-icon="truck" class="tab">Levering</button>
            <button data-tab="analytics" data-icon="chart-no-axes-column" class="tab">Analytics</button>
            <button data-tab="loggDetaljert" data-icon="history" class="tab">Detaljert logg</button>
            <button data-tab="settings" data-icon="settings" class="tab">Settings</button>
          </nav>

          <button
            id="themeToggle"
            class="theme-toggle tabs-theme-toggle"
            type="button"
            aria-label="Bytt tema"
            title="Bytt tema"
          ></button>
        </div>
      </div>

      <div class="top-bar global-week-nav">
        <button id="prevWeek" data-icon="chevron-left" class="week-btn" title="Forrige uke">Forrige</button>

        <div id="weekLabel" class="week-label">Uke</div>

        <button id="nextWeek" data-icon="chevron-right" class="week-btn" title="Neste uke">Neste</button>
      </div>

      <div class="week-status-row"></div>

      <main id="tabContent"></main>
    </div>

    <div id="modal" class="modal hidden"></div>

    <div id="contextMenu" class="context-menu hidden">
      <button data-action="edit" data-icon="pencil">Rediger</button>
      <button data-action="clear" data-icon="eraser">Tøm</button>
      <button data-action="copy" data-icon="copy">Kopier</button>
      <button data-action="paste" data-icon="clipboard">Lim inn</button>
    </div>

    <script type="module" src="js/app.js?v=202605040001"></script>
  </body>
</html>
